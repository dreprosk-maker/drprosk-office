<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Prosk Office Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#eef1f5;color:#1a1a2e;min-height:100vh;position:relative;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse at 20% 20%, rgba(168,198,255,0.4) 0%, transparent 50%),
  radial-gradient(ellipse at 80% 80%, rgba(200,168,255,0.3) 0%, transparent 50%),
  radial-gradient(ellipse at 50% 50%, rgba(168,235,255,0.2) 0%, transparent 60%);
z-index:0;pointer-events:none}
#dashboard{display:block;padding:30px;max-width:1200px;margin:0 auto;position:relative;z-index:1}
.header{text-align:center;margin-bottom:36px}
.header h1{font-size:2.2rem;font-weight:700;color:#1a1a2e;margin-bottom:5px;letter-spacing:-0.5px}
.header p{color:#6b7280;font-size:0.95rem;font-weight:400}
.section{margin-bottom:30px}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sec-name{font-size:1.3rem;font-weight:600;color:#1a1a2e;background:none;border:none;outline:none;cursor:text;padding:2px 6px;border-radius:6px;transition:background .2s}
.sec-name:hover{background:rgba(168,198,255,0.2)}
.sec-name:focus{background:rgba(168,198,255,0.3);color:#1a1a2e}
.sec-del{background:none;border:none;color:#ef5350;cursor:pointer;font-size:1rem;opacity:0;transition:opacity .2s}
.sec-head:hover .sec-del{opacity:1}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px}
.card{
  background:rgba(255,255,255,0.45);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.6);
  border-radius:16px;padding:20px;cursor:pointer;
  transition:all .3s cubic-bezier(0.4,0,0.2,1);
  position:relative;text-decoration:none;color:inherit;display:block;
  box-shadow:0 2px 16px rgba(0,0,0,0.04), 0 0 0 1px rgba(255,255,255,0.4) inset;
}
.card:hover{
  background:rgba(255,255,255,0.65);
  transform:translateY(-3px);
  box-shadow:0 8px 32px rgba(0,0,0,0.08), 0 0 0 1px rgba(255,255,255,0.6) inset;
  border-color:rgba(168,198,255,0.5);
}
.card-icon{font-size:2rem;margin-bottom:8px}
.card-title{font-weight:600;font-size:1.05rem;color:#1a1a2e;margin-bottom:4px}
.card-desc{font-size:0.85rem;color:#6b7280}
.card-actions{position:absolute;top:10px;right:10px;display:flex;gap:4px;opacity:0;transition:opacity .2s}
.card:hover .card-actions{opacity:1}
.card-actions button{
  background:rgba(255,255,255,0.6);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.5);color:#6b7280;cursor:pointer;
  border-radius:8px;width:30px;height:30px;font-size:0.8rem;transition:all .2s;
}
.card-actions button:hover{background:rgba(168,198,255,0.4);color:#1a1a2e;border-color:rgba(168,198,255,0.5)}
.add-card{
  border:2px dashed rgba(168,198,255,0.4);
  background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-radius:16px;padding:20px;cursor:pointer;text-align:center;
  color:#9ca3af;font-size:0.95rem;transition:all .3s;
}
.add-card:hover{border-color:rgba(100,140,255,0.6);color:#4f6df5;background:rgba(255,255,255,0.3)}
.add-sec{
  display:inline-block;margin-bottom:30px;padding:10px 20px;
  border:2px dashed rgba(168,198,255,0.4);border-radius:10px;
  background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  color:#9ca3af;cursor:pointer;font-size:0.95rem;transition:all .3s;
}
.add-sec:hover{border-color:rgba(100,140,255,0.6);color:#4f6df5;background:rgba(255,255,255,0.35)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:100;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{
  background:rgba(255,255,255,0.7);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,0.6);
  border-radius:20px;padding:28px;width:90%;max-width:450px;
  box-shadow:0 16px 64px rgba(0,0,0,0.1), 0 0 0 1px rgba(255,255,255,0.5) inset;
}
.modal h2{margin-bottom:16px;color:#1a1a2e;font-size:1.2rem;font-weight:600}
.modal label{display:block;margin-bottom:4px;color:#6b7280;font-size:0.85rem;font-weight:500}
.modal input,.modal select{
  width:100%;padding:10px 14px;margin-bottom:12px;
  background:rgba(255,255,255,0.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(200,210,230,0.6);border-radius:10px;
  color:#1a1a2e;font-size:0.95rem;transition:border-color .2s;
}
.modal input:focus,.modal select:focus{border-color:rgba(100,140,255,0.6);outline:none;background:rgba(255,255,255,0.7)}
.emoji-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.emoji-grid span{font-size:1.5rem;cursor:pointer;padding:4px;border-radius:8px;border:2px solid transparent;transition:all .2s}
.emoji-grid span:hover{background:rgba(168,198,255,0.2)}
.emoji-grid span.sel{border-color:rgba(100,140,255,0.5);background:rgba(168,198,255,0.15)}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:12px}
.modal-btns button{padding:9px 22px;border:none;border-radius:10px;cursor:pointer;font-size:0.95rem;font-weight:500;transition:all .2s}
.btn-save{background:rgba(79,109,245,0.85);color:#fff;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.btn-save:hover{background:rgba(79,109,245,1);box-shadow:0 4px 16px rgba(79,109,245,0.3)}
.btn-cancel{background:rgba(200,210,230,0.4);color:#6b7280;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.btn-cancel:hover{background:rgba(200,210,230,0.6);color:#1a1a2e}
</style>
</head>
<body>
<div id="dashboard">
<div class="header">
<h1>Dr. Prosk Office Portal</h1>
<p>Office Tools &amp; Resources</p>
</div>
<div id="sections"></div>
<button class="add-sec" onclick="addSection()">+ Section</button>
</div>
<div class="overlay" id="overlay">
<div class="modal">
<h2 id="modalTitle">Add Tool</h2>
<label>Icon</label>
<div class="emoji-grid" id="emojiGrid"></div>
<label>Title</label>
<input id="mTitle" placeholder="Tool name">
<label>Description</label>
<input id="mDesc" placeholder="Short description">
<label>Link</label>
<input id="mLink" placeholder="https://...">
<label>Open in</label>
<select id="mTarget"><option value="_blank">New tab</option><option value="_self">Same tab</option></select>
<div class="modal-btns">
<button class="btn-cancel" onclick="closeModal()">Cancel</button>
<button class="btn-save" onclick="saveCard()">Save</button>
</div>
</div>
</div>
<script>
const EMOJIS=['🖨️','📋','📊','📁','📅','📧','💼','🔧','📝','📞','🏥','💉','🦷','👨‍⚕️','👩‍⚕️','🩺','🔬','💊','📑','🗂️','📌','✅','🔗','🌐','🖥️','📸','🎯','⚙️','📦','🛡️','📈','🏢'];
const DEFAULT_DATA={sections:[
{name:"Office Tools",cards:[
{icon:"🖨️",title:"Printer Quality Tracker",desc:"3D print quality tracking",link:"https://drprosk.com/printer-quality-tracker/",target:"_blank"},
{icon:"📅",title:"Schedule",desc:"Office calendar & scheduling",link:"#",target:"_blank"},
{icon:"📋",title:"Forms",desc:"Patient & office forms",link:"#",target:"_blank"}
]},
{name:"Quick Links",cards:[
{icon:"🌐",title:"Main Portal",desc:"drprosk.com main site",link:"https://drprosk.com",target:"_blank"},
{icon:"📧",title:"Office Email",desc:"Check office email",link:"https://mail.google.com",target:"_blank"}
]}
]};
let data,editIdx=null,editSec=null;
function load(){try{data=JSON.parse(localStorage.getItem('office_dash'))||DEFAULT_DATA}catch{data=DEFAULT_DATA}render()}
function save(){localStorage.setItem('office_dash',JSON.stringify(data))}
function render(){
const c=document.getElementById('sections');c.innerHTML='';
data.sections.forEach((s,si)=>{
const sec=document.createElement('div');sec.className='section';
sec.innerHTML=`<div class="sec-head"><input class="sec-name" value="${s.name}" onchange="renSec(${si},this.value)" spellcheck="false"><button class="sec-del" onclick="delSec(${si})">\u2715</button></div><div class="grid" id="grid-${si}"></div>`;
c.appendChild(sec);
const g=sec.querySelector('.grid');
s.cards.forEach((card,ci)=>{
const d=document.createElement('a');d.className='card';d.href=card.link;d.target=card.target;
d.innerHTML=`<div class="card-actions"><button onclick="event.preventDefault();editCard(${si},${ci})">\u270F\uFE0F</button><button onclick="event.preventDefault();delCard(${si},${ci})">\u{1F5D1}\uFE0F</button></div><div class="card-icon">${card.icon}</div><div class="card-title">${card.title}</div><div class="card-desc">${card.desc}</div>`;
g.appendChild(d)});
const ab=document.createElement('div');ab.className='add-card';ab.textContent='+ Add tool';ab.onclick=()=>openModal(si);g.appendChild(ab)});}
function renSec(i,v){data.sections[i].name=v;save()}
function delSec(i){if(confirm('Delete this section?')){data.sections.splice(i,1);save();render()}}
function addSection(){data.sections.push({name:'New Section',cards:[]});save();render()}
function openModal(si,ci){
editSec=si;editIdx=ci!=null?ci:null;
const card=ci!=null?data.sections[si].cards[ci]:{icon:'📋',title:'',desc:'',link:'',target:'_blank'};
document.getElementById('modalTitle').textContent=ci!=null?'Edit Tool':'Add Tool';
buildEmoji(card.icon);
document.getElementById('mTitle').value=card.title;
document.getElementById('mDesc').value=card.desc;
document.getElementById('mLink').value=card.link;
document.getElementById('mTarget').value=card.target;
document.getElementById('overlay').classList.add('show')}
function closeModal(){document.getElementById('overlay').classList.remove('show');editIdx=null;editSec=null}
function buildEmoji(sel){
const g=document.getElementById('emojiGrid');g.innerHTML='';
EMOJIS.forEach(e=>{const s=document.createElement('span');s.textContent=e;if(e===sel)s.classList.add('sel');s.onclick=()=>{g.querySelectorAll('span').forEach(x=>x.classList.remove('sel'));s.classList.add('sel')};g.appendChild(s)})}
function getSelEmoji(){const s=document.querySelector('.emoji-grid .sel');return s?s.textContent:'📋'}
function saveCard(){
const card={icon:getSelEmoji(),title:document.getElementById('mTitle').value||'Untitled',desc:document.getElementById('mDesc').value,link:document.getElementById('mLink').value||'#',target:document.getElementById('mTarget').value};
if(editIdx!=null){data.sections[editSec].cards[editIdx]=card}else{data.sections[editSec].cards.push(card)}
save();render();closeModal()}
function editCard(si,ci){openModal(si,ci)}
function delCard(si,ci){if(confirm('Delete this tool?')){data.sections[si].cards.splice(ci,1);save();render()}}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
load();
</script>
</body>
</html>
