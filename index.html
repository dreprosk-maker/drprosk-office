<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Prosk Office Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1923;color:#e0e0e0;min-height:100vh}
#dashboard{display:block;padding:30px;max-width:1200px;margin:0 auto}
.header{text-align:center;margin-bottom:30px}
.header h1{font-size:2.2rem;background:linear-gradient(135deg,#4fc3f7,#0288d1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px}
.header p{color:#78909c;font-size:0.95rem}
.section{margin-bottom:30px}
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sec-name{font-size:1.3rem;font-weight:600;color:#4fc3f7;background:none;border:none;outline:none;cursor:text;padding:2px 6px;border-radius:4px}
.sec-name:hover{background:rgba(79,195,247,0.1)}
.sec-name:focus{background:rgba(79,195,247,0.15);color:#fff}
.sec-del{background:none;border:none;color:#ef5350;cursor:pointer;font-size:1rem;opacity:0;transition:opacity .2s}
.sec-head:hover .sec-del{opacity:1}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px}
.card{background:linear-gradient(135deg,#1a2733,#1e3040);border:1px solid #263845;border-radius:12px;padding:18px;cursor:pointer;transition:all .2s;position:relative;text-decoration:none;color:inherit;display:block}
.card:hover{border-color:#4fc3f7;transform:translateY(-2px);box-shadow:0 4px 20px rgba(79,195,247,0.15)}
.card-icon{font-size:2rem;margin-bottom:8px}
.card-title{font-weight:600;font-size:1.05rem;color:#e0e0e0;margin-bottom:4px}
.card-desc{font-size:0.85rem;color:#78909c}
.card-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .2s}
.card:hover .card-actions{opacity:1}
.card-actions button{background:rgba(255,255,255,0.1);border:none;color:#b0bec5;cursor:pointer;border-radius:4px;width:28px;height:28px;font-size:0.8rem}
.card-actions button:hover{background:rgba(79,195,247,0.3);color:#fff}
.add-card{border:2px dashed #263845;background:transparent;border-radius:12px;padding:18px;cursor:pointer;text-align:center;color:#546e7a;font-size:0.95rem;transition:all .2s}
.add-card:hover{border-color:#4fc3f7;color:#4fc3f7}
.add-sec{display:inline-block;margin-bottom:30px;padding:10px 20px;border:2px dashed #263845;border-radius:8px;background:transparent;color:#546e7a;cursor:pointer;font-size:0.95rem;transition:all .2s}
.add-sec:hover{border-color:#4fc3f7;color:#4fc3f7}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:#1a2733;border:1px solid #263845;border-radius:16px;padding:25px;width:90%;max-width:450px}
.modal h2{margin-bottom:15px;color:#4fc3f7;font-size:1.2rem}
.modal label{display:block;margin-bottom:4px;color:#90a4ae;font-size:0.85rem}
.modal input,.modal select{width:100%;padding:10px;margin-bottom:12px;background:#0f1923;border:1px solid #263845;border-radius:8px;color:#e0e0e0;font-size:0.95rem}
.modal input:focus,.modal select:focus{border-color:#4fc3f7;outline:none}
.emoji-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.emoji-grid span{font-size:1.5rem;cursor:pointer;padding:4px;border-radius:6px;border:2px solid transparent}
.emoji-grid span:hover{background:rgba(79,195,247,0.15)}
.emoji-grid span.sel{border-color:#4fc3f7}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:10px}
.modal-btns button{padding:8px 20px;border:none;border-radius:8px;cursor:pointer;font-size:0.95rem}
.btn-save{background:#0288d1;color:#fff}
.btn-save:hover{background:#0277bd}
.btn-cancel{background:#37474f;color:#b0bec5}
.btn-cancel:hover{background:#455a64}
</style>
</head>
<body>
<div id="dashboard">
<div class="header">
<h1>Dr. Prosk Office Portal</h1>
<p>Office Tools &amp; Resources</p>
</div>
<div id="sections"></div>
<button class="add-sec" onclick="addSection()">+ Section</button>
</div>
<div class="overlay" id="overlay">
<div class="modal">
<h2 id="modalTitle">Add Tool</h2>
<label>Icon</label>
<div class="emoji-grid" id="emojiGrid"></div>
<label>Title</label>
<input id="mTitle" placeholder="Tool name">
<label>Description</label>
<input id="mDesc" placeholder="Short description">
<label>Link</label>
<input id="mLink" placeholder="https://...">
<label>Open in</label>
<select id="mTarget"><option value="_blank">New tab</option><option value="_self">Same tab</option></select>
<div class="modal-btns">
<button class="btn-cancel" onclick="closeModal()">Cancel</button>
<button class="btn-save" onclick="saveCard()">Save</button>
</div>
</div>
</div>
<script>
const EMOJIS=['🖨️','📋','📊','📁','📅','📧','💼','🔧','📝','📞','🏥','💉','🦷','👨‍⚕️','👩‍⚕️','🩺','🔬','💊','📑','🗂️','📌','✅','🔗','🌐','🖥️','📸','🎯','⚙️','📦','🛡️','📈','🏢'];
const DEFAULT_DATA={sections:[
{name:"Office Tools",cards:[
{icon:"🖨️",title:"Printer Quality Tracker",desc:"3D print quality tracking",link:"https://drprosk.com/printer-quality-tracker/",target:"_blank"},
{icon:"📅",title:"Schedule",desc:"Office calendar & scheduling",link:"#",target:"_blank"},
{icon:"📋",title:"Forms",desc:"Patient & office forms",link:"#",target:"_blank"}
]},
{name:"Quick Links",cards:[
{icon:"🌐",title:"Main Portal",desc:"drprosk.com main site",link:"https://drprosk.com",target:"_blank"},
{icon:"📧",title:"Office Email",desc:"Check office email",link:"https://mail.google.com",target:"_blank"}
]}
]};
let data,editIdx=null,editSec=null;
function load(){try{data=JSON.parse(localStorage.getItem('office_dash'))||DEFAULT_DATA}catch{data=DEFAULT_DATA}render()}
function save(){localStorage.setItem('office_dash',JSON.stringify(data))}
function render(){
const c=document.getElementById('sections');c.innerHTML='';
data.sections.forEach((s,si)=>{
const sec=document.createElement('div');sec.className='section';
sec.innerHTML=`<div class="sec-head"><input class="sec-name" value="${s.name}" onchange="renSec(${si},this.value)" spellcheck="false"><button class="sec-del" onclick="delSec(${si})">✕</button></div><div class="grid" id="grid-${si}"></div>`;
c.appendChild(sec);
const g=sec.querySelector('.grid');
s.cards.forEach((card,ci)=>{
const d=document.createElement('a');d.className='card';d.href=card.link;d.target=card.target;
d.innerHTML=`<div class="card-actions"><button onclick="event.preventDefault();editCard(${si},${ci})">✏️</button><button onclick="event.preventDefault();delCard(${si},${ci})">🗑️</button></div><div class="card-icon">${card.icon}</div><div class="card-title">${card.title}</div><div class="card-desc">${card.desc}</div>`;
g.appendChild(d)});
const ab=document.createElement('div');ab.className='add-card';ab.textContent='+ Add tool';ab.onclick=()=>openModal(si);g.appendChild(ab)});}
function renSec(i,v){data.sections[i].name=v;save()}
function delSec(i){if(confirm('Delete this section?')){data.sections.splice(i,1);save();render()}}
function addSection(){data.sections.push({name:'New Section',cards:[]});save();render()}
function openModal(si,ci){
editSec=si;editIdx=ci!=null?ci:null;
const card=ci!=null?data.sections[si].cards[ci]:{icon:'📋',title:'',desc:'',link:'',target:'_blank'};
document.getElementById('modalTitle').textContent=ci!=null?'Edit Tool':'Add Tool';
buildEmoji(card.icon);
document.getElementById('mTitle').value=card.title;
document.getElementById('mDesc').value=card.desc;
document.getElementById('mLink').value=card.link;
document.getElementById('mTarget').value=card.target;
document.getElementById('overlay').classList.add('show')}
function closeModal(){document.getElementById('overlay').classList.remove('show');editIdx=null;editSec=null}
function buildEmoji(sel){
const g=document.getElementById('emojiGrid');g.innerHTML='';
EMOJIS.forEach(e=>{const s=document.createElement('span');s.textContent=e;if(e===sel)s.classList.add('sel');s.onclick=()=>{g.querySelectorAll('span').forEach(x=>x.classList.remove('sel'));s.classList.add('sel')};g.appendChild(s)})}
function getSelEmoji(){const s=document.querySelector('.emoji-grid .sel');return s?s.textContent:'📋'}
function saveCard(){
const card={icon:getSelEmoji(),title:document.getElementById('mTitle').value||'Untitled',desc:document.getElementById('mDesc').value,link:document.getElementById('mLink').value||'#',target:document.getElementById('mTarget').value};
if(editIdx!=null){data.sections[editSec].cards[editIdx]=card}else{data.sections[editSec].cards.push(card)}
save();render();closeModal()}
function editCard(si,ci){openModal(si,ci)}
function delCard(si,ci){if(confirm('Delete this tool?')){data.sections[si].cards.splice(ci,1);save();render()}}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
load();
</script>
</body>
</html>
